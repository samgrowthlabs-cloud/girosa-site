<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisar Imagens por Código</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            color: #333;
        }
        
        .container {
            width: 100%;
            max-width: 800px;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            margin-top: 2rem;
        }
        
        header {
            background: #2575fc;
            color: white;
            padding: 1.5rem;
            text-align: center;
        }
        
        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            font-size: 1rem;
            opacity: 0.9;
        }
        
        .search-section {
            padding: 2rem;
            border-bottom: 1px solid #eee;
        }
        
        .search-form {
            display: flex;
            gap: 10px;
        }
        
        .search-input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .search-input:focus {
            border-color: #2575fc;
            outline: none;
            box-shadow: 0 0 0 3px rgba(37, 117, 252, 0.2);
        }
        
        .search-btn {
            background: #2575fc;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .search-btn:hover {
            background: #1a68e8;
        }
        
        .result-section {
            padding: 2rem;
            text-align: center;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .loading {
            display: none;
            margin: 20px 0;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(37, 117, 252, 0.3);
            border-radius: 50%;
            border-top-color: #2575fc;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .image-container {
            max-width: 100%;
            margin-top: 20px;
            display: none;
        }
        
        .result-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .error-message {
            color: #e74c3c;
            margin-top: 15px;
            padding: 10px;
            background: #ffeaea;
            border-radius: 8px;
            display: none;
        }
        
        .no-results {
            color: #7f8c8d;
            margin-top: 20px;
            display: none;
        }
        
        footer {
            margin-top: 2rem;
            color: white;
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        @media (max-width: 600px) {
            .container {
                margin-top: 1rem;
            }
            
            .search-form {
                flex-direction: column;
            }
            
            .search-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Pesquisar Imagens por Código</h1>
            <p class="subtitle">Digite o código para buscar a imagem correspondente</p>
        </header>
        
        <section class="search-section">
            <form class="search-form" id="searchForm">
                <input 
                    type="text" 
                    class="search-input" 
                    id="searchInput" 
                    placeholder="Ex: FEM--001" 
                    required
                >
                <button type="submit" class="search-btn">Pesquisar</button>
            </form>
        </section>
        
        <section class="result-section">
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Buscando imagem...</p>
            </div>
            
            <div class="image-container" id="imageContainer">
                <img class="result-image" id="resultImage" src="" alt="Imagem do código">
            </div>
            
            <div class="error-message" id="errorMessage">
                Ocorreu um erro ao buscar a imagem. Tente novamente.
            </div>
            
            <div class="no-results" id="noResults">
                Nenhuma imagem encontrada para este código.
            </div>
        </section>
    </div>
    
    <footer>
        <p>Aplicação integrada com Supabase | Desenvolvido para pesquisa de imagens</p>
    </footer>

    <script>
        // CONFIGURAÇÕES DO SUPABASE - ATUALIZE COM SUAS INFORMAÇÕES
        const SUPABASE_URL = 'https://YOUR-PROJECT.supabase.co';
        const SUPABASE_ANON_KEY = 'SUA_ANON_KEY_AQUI';
        
        document.getElementById('searchForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const searchInput = document.getElementById('searchInput');
            const code = searchInput.value.trim();
            
            if (!code) {
                alert('Por favor, digite um código para pesquisar');
                return;
            }
            
            // Limpar resultados anteriores
            hideAllMessages();
            
            // Mostrar loading
            document.getElementById('loading').style.display = 'block';
            
            try {
                const imgUrl = await buscarImagem(code);
                
                // Esconder loading
                document.getElementById('loading').style.display = 'none';
                
                if (imgUrl) {
                    // Mostrar imagem
                    const resultImage = document.getElementById('resultImage');
                    resultImage.src = imgUrl;
                    resultImage.alt = `Imagem do código ${code}`;
                    document.getElementById('imageContainer').style.display = 'block';
                } else {
                    // Mostrar mensagem de nenhum resultado
                    document.getElementById('noResults').style.display = 'block';
                }
            } catch (error) {
                console.error('Erro ao buscar imagem:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('errorMessage').style.display = 'block';
            }
        });
        
        async function buscarImagem(codigo) {
            const res = await fetch(
            `https://ryqlprvtsqzydvfkzuhu.supabase.co/functions/v1/clever-handler?action=get_image&code=${codigo}`
            );
            const data = await res.json();
            return data.img_url;

        }
        
        function hideAllMessages() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('imageContainer').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('noResults').style.display = 'none';
        }
    </script>
</body>
</html>
