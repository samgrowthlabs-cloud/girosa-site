<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notícias - Girosa Beauty</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/noticia.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header e Navegação -->
    <header>
        <div id="header-placeholder"></div>
    </header>

    <!-- Seção Hero -->
    <section class="page-hero">
        <div class="page-hero-content">
            <h1>Notícias</h1>
            <p>Fique por dentro das novidades do Girosa Beauty</p>
        </div>
    </section>

    <!-- Seção Notícias -->
    <section id="news">
        <div class="news-grid" id="news-container">
            <!-- As notícias serão carregadas aqui por ordem de prioridade -->
        </div>
    </section>

    <!-- Modal para Notícias - CORRIGIDO -->
    <div id="news-modal" class="modal">
        <div class="news-modal-content">
            <div class="modal-header">
                <h2 id="modal-news-title"></h2>
                <div class="modal-date" id="modal-news-date"></div>
                <button class="close-modal">&times;</button>
            </div>

            <div class="modal-media" id="modal-news-media">
                <!-- Mídia será inserida aqui -->
            </div>

            <div class="modal-body">
                <div class="modal-description" id="modal-news-description"></div>
            </div>

            <div class="modal-footer">
                <div class="modal-reactions">
                    <button class="modal-reaction-btn like" onclick="handleModalReaction(this, 'like')">
                        👍 Legal
                    </button>
                    <button class="modal-reaction-btn neutral" onclick="handleModalReaction(this, 'neutral')">
                        😊 Gostei
                    </button>
                    <button class="modal-reaction-btn dislike" onclick="handleModalReaction(this, 'dislike')">
                        ❌ Tanto Faz
                    </button>
                </div>
            </div>
        </div>
    </div>


    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="../js/template.js"></script>
    <script src="../js/noticia.js"></script>
    <script src="../js/common.js"></script>
</body>
</html>
