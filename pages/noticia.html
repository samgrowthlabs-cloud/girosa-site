<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notícias - Girosa Beauty</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/noticia.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header e Navegação -->
    <header>
        <div id="header-placeholder"></div>
    </header>

    <!-- Seção Hero -->
    <section class="page-hero">
        <div class="page-hero-content">
            <h1>Notícias</h1>
            <p>Fique por dentro das novidades do Girosa Beauty</p>
        </div>
    </section>

    <!-- Seção Notícias -->
    <section id="news">
        <div class="news-grid" id="news-container">
            <!-- As notícias serão carregadas aqui por ordem de prioridade -->
        </div>
    </section>

    <!-- Modal para Notícias -->
    <div id="news-modal" class="modal">
        <div class="news-modal-content">
            <div class="modal-header">
                <h2 id="modal-news-title"></h2>
                <div class="modal-date" id="modal-news-date"></div>
                <button class="close-modal">&times;</button>
            </div>

            <div class="modal-media" id="modal-news-media">
                <!-- Mídia será inserida aqui -->
            </div>

            <div class="modal-body">
                <div class="modal-description" id="modal-news-description"></div>

                <!-- BOTÃO FIXO DE COMPARTILHAMENTO (NO FINAL DO MODAL-BODY) -->
                <div class="share-fixed-container">
                    <button class="share-trigger-btn" onclick="openSharePopup()">
                        <i class="fas fa-share-alt"></i>
                        Compartilhar esta notícia
                    </button>
                </div>
            </div>

            <!-- RODAPÉ DO MODAL SEM REAÇÕES -->
            <div class="modal-footer">
                <!-- Espaço vazio ou pode adicionar outras informações se necessário -->
            </div>
        </div>
    </div>

    <!-- POPUP DE COMPARTILHAMENTO -->
    <div class="share-popup-overlay" id="share-popup">
        <div class="share-popup">
            <div class="share-popup-header">
                <h3>📤 Compartilhar Notícia</h3>
                <p>Escolha como deseja compartilhar</p>
            </div>
            
            <div class="share-popup-grid">
                <button class="share-popup-btn whatsapp" onclick="shareOnWhatsApp()">
                    <i class="fab fa-whatsapp"></i>
                    <span>WhatsApp</span>
                </button>
                <button class="share-popup-btn facebook" onclick="shareOnFacebook()">
                    <i class="fab fa-facebook"></i>
                    <span>Facebook</span>
                </button>
                <button class="share-popup-btn twitter" onclick="shareOnTwitter()">
                    <i class="fab fa-twitter"></i>
                    <span>Twitter</span>
                </button>
                <button class="share-popup-btn linkedin" onclick="shareOnLinkedIn()">
                    <i class="fab fa-linkedin"></i>
                    <span>LinkedIn</span>
                </button>
                <button class="share-popup-btn email" onclick="shareOnEmail()">
                    <i class="fas fa-envelope"></i>
                    <span>E-mail</span>
                </button>
                <button class="share-popup-btn copy" onclick="copyNewsLink()">
                    <i class="fas fa-link"></i>
                    <span>Copiar Link</span>
                </button>
            </div>
            
            <div class="share-popup-actions">
                <button class="share-popup-close" onclick="closeSharePopup()">
                    <i class="fas fa-times"></i>
                    Fechar
                </button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="../js/template.js"></script>
    <script src="../js/noticia.js"></script>
    <script src="../js/common.js"></script>
</body>
</html>
