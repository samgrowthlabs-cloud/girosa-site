<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notícias - Girosa Beauty</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header e Navegação -->
    <header>
        <div id="header-placeholder"></div>
    </header>

    <!-- Seção Hero -->
    <section class="page-hero">
        <div class="page-hero-content">
            <h1>Notícias</h1>
            <p>Fique por dentro das novidades do Girosa Beauty</p>
        </div>
    </section>

    <!-- Seção Notícias -->
    <section id="news">
        <div class="news-grid" id="news-container">
            <!-- As notícias serão carregadas aqui por ordem de prioridade -->
        </div>
    </section>

    <!-- Modal para Notícias - Estilo Rede Social -->
    <div id="news-modal" class="modal">
        <div class="news-modal-content">
            <!-- Header -->
            <div class="news-modal-header">
                <div class="modal-avatar">GB</div>
                <div class="modal-user-info">
                    <div class="modal-username">girosabeauty</div>
                    <div class="modal-date" id="modal-news-date"></div>
                </div>
                <button class="close-modal">&times;</button>
            </div>

            <!-- Body -->
            <div class="news-modal-body">
                <!-- Container de Mídia -->
                <div class="modal-media-container" id="modal-news-media">
                    <!-- Imagem ou vídeo será inserido aqui -->
                </div>

                <!-- Sidebar (Instagram Style) -->
                <div class="modal-sidebar">
                    <!-- Ações -->
                    <div class="modal-actions">
                        <div class="modal-action-buttons">
                            <button class="modal-action-btn like-btn" id="modal-like-btn">
                                <i class="far fa-heart"></i>
                            </button>
                            <button class="modal-action-btn comment-btn">
                                <i class="far fa-comment"></i>
                            </button>
                            <button class="modal-action-btn share-btn">
                                <i class="far fa-paper-plane"></i>
                            </button>
                            <button class="modal-action-btn save-btn" style="margin-left: auto;">
                                <i class="far fa-bookmark"></i>
                            </button>
                        </div>
                        <div class="modal-likes">
                            <span id="modal-likes-count">0</span> curtidas
                        </div>
                    </div>

                    <!-- Descrição -->
                    <div class="modal-description">
                        <div class="modal-username" style="display: inline; font-weight: 600; margin-right: 5px;">
                            girosabeauty
                        </div>
                        <span class="modal-description-text" id="modal-news-description"></span>
                        <div class="news-hashtags">#girosabeauty #tranças #beleza</div>
                    </div>

                    <!-- Comentários -->
                    <div class="modal-comments">
                        Ver todos os <span id="modal-comments-count">0</span> comentários
                    </div>
                </div>
            </div>
        </div>
    </div>



    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="../js/template.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
